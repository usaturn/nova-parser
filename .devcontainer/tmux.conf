# reduce delay of key stroke
set -sg escape-time 1

# begin index of window from 1
set -g base-index 1

# begin index of pane from 1
setw -g pane-base-index 1

# rireki
set-option -g history-limit 5000000

# reload tmux config file
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# set prefix key
set-option -g prefix C-k
# cancel the key bindings for C-b
unbind-key C-b
bind-key C-k send-prefix

# split the pane with a pipe in a vertical
bind v split-window -h

# split the pane with a pipe in a transverse
bind w split-window -v

#起動シェルを指定
set-option -g default-shell /bin/zsh

# 呼び出し元シェルの TZ を取り込む
set-option -g update-environment "TZ"

# move between the panes in the key bindings for vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

#256色端末を使用
#"screen-256color" にするとvimの<Home><End>が変わるのでxtermに変更
#set-option -g default-terminal "screen-256color"
set-option -g default-terminal "xterm"
set-option -g xterm-keys on

set-option -g @c-base-100 "#001C23"
set-option -g @c-base-content "#FFD6A7"
set-option -g @c-primary "#BEFF00"
set-option -g @c-primary-content "#507000"
set-option -g @c-neutral "#003741"
set-option -g @c-neutral-content "#FFD6A7"
set-option -g @c-info "#00BAFE"
set-option -g @c-info-content "#042E49"

set-option -g @c-git-clean "#BEFF00"
set-option -g @c-git-clean-content "#507000"
set-option -g @c-git-staged "#E5A700"
set-option -g @c-git-staged-content "#3D2800"
set-option -g @c-git-dirty "#FF5555"
set-option -g @c-git-dirty-content "#FFFFFF"

set-option -g status-style "bg=#{@c-base-100}"
set-option -g status-right-length 120

set-option -g status-right '#(~/bin/tmux-git-prompt.bash #{pane_current_path} "#{@c-base-100}") #( \
  label="%m/%d(%a) %H:%M"; \
  bg="#{@c-base-100}"; \
  color="#{@c-info}"; \
  text_fg="#{@c-info-content}"; \
  echo " #[bg=$bg,fg=$color]#[bg=$color,fg=$text_fg]$label#[bg=$bg,fg=$color]"; \
)'

# 月〜金の9:00〜18:00まではWORK、それ以外はCHILL
set-option -g status-left '#( \
  hour=$(date +%H); \
  dow=$(date +%u); \
  bg="#{@c-base-100}"; \
  color="#{@c-info}"; \
  text_fg="#{@c-info-content}"; \
  if [ $dow -ge 1 ] && [ $dow -le 5 ] && [ $hour -ge 9 ] && [ $hour -lt 18 ]; then \
    label="WORK"; \
  else \
    label="CHILL"; \
  fi; \
  echo "#[bg=$bg,fg=$color]#[bg=$color,fg=$text_fg]$label#[bg=$bg,fg=$color]  "; \
)'

set-option -gw window-status-separator ""
set-option -gw window-status-format '#( \
  label=" #W "; \
  bg="#{@c-base-100}"; \
  color="#{@c-neutral}"; \
  text_fg="#{@c-neutral-content}"; \
  if [ "#{window_bell_flag}" = "1" ]; then \
    label=" 󱅫 #W "; \
    color="#{@c-info}"; \
    text_fg="#{@c-info-content}"; \
  fi; \
  echo "#[bg=$bg,fg=$color]#[bg=$color,fg=$text_fg]$label#[bg=$bg,fg=$color]"; \
)'
set-option -gw window-status-bell-style "bold"

set-option -gw window-status-current-format '#( \
  label=" #W "; \
  bg="#{@c-base-100}"; \
  color="#{@c-primary}"; \
  text_fg="#{@c-primary-content}"; \
  echo "#[bg=$bg,fg=$color]#[bg=$color,fg=$text_fg,bold]$label#[bg=$bg,fg=$color,nobold]"; \
)'

set-option -g pane-border-style "fg=#{@c-base-content}"
set-option -g pane-active-border-style "fg=#{@c-primary}"

# set the copy mode
## use the key bindings for vi
setw -g mode-keys vi

# URL copy: extract URLs from pane and copy via fzf
bind u run-shell -b 'tmux display-popup -w 80% -h 60% -E "~/bin/tmux-url-copy.zsh #{pane_id}"'

# Don't use a mouse
set -ga terminal-overrides 'xterm*:smcup@:rmcup@'
set -g mouse off
